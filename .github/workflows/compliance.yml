name: compliance

# Configuración necesaria en el repositorio (Settings -> Secrets and variables -> Actions):
#
#   secrets:
#     OPENAI_API_KEY            # API key de OpenAI o de Azure OpenAI
#
#   variables (opcionales — sólo si se usa Azure OpenAI):
#     AZURE_OPENAI_ENDPOINT     # ej: https://my-aoai.openai.azure.com
#     AZURE_OPENAI_API_VERSION  # ej: 2025-04-01-preview
#     OPENAI_MODEL              # ej: gpt-5.4-pro (deployment name en Azure)
#
# Si AZURE_OPENAI_ENDPOINT está vacío, el engine usa el cliente OpenAI público.
#
# Activación: este workflow es opt-in. Solo se ejecuta si el PR lleva el label
# `security-check`. El label hay que crearlo una vez en el repo
# (Issues -> Labels -> New label, o `gh label create security-check`).

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: compliance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hello-llm:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Opt-in: solo corre si el PR lleva el label `security-check`
    # (o si se lanza manualmente con workflow_dispatch).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'security-check')
    defaults:
      run:
        working-directory: terraform-compliance-engine
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: terraform-compliance-engine/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run compliance engine (MVP step 1)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          AZURE_OPENAI_ENDPOINT: ${{ vars.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_VERSION: ${{ vars.AZURE_OPENAI_API_VERSION }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python engine/run.py
